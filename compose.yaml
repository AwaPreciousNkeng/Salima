services:
  postgres:
    image: 'postgres:latest'
    container_name: 'salima_postgres'
    restart: unless-stopped
    environment:
      - 'POSTGRES_PASSWORD=pcodes'
      - 'POSTGRES_USER=pcodes'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/

volumes:
  postgres_data: